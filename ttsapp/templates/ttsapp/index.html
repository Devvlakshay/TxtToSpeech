<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voicd - Text to Speech</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ccc;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 20px;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: #5b8def;
        }
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 1rem;
            margin-bottom: 24px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #5b8def;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #4a7de0; }
        button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .error {
            background: #3a1a1a;
            border: 1px solid #662222;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .result {
            margin-top: 28px;
            padding: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .result h3 {
            margin-bottom: 16px;
            color: #fff;
        }
        audio {
            width: 100%;
            margin-bottom: 16px;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2a8a5a;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            width: auto;
        }
        .download-btn:hover { background: #237a4e; }
        .spinner {
            display: none;
            margin-top: 16px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Voicd</h1>
        <p class="subtitle">Text-to-Speech powered by Gemini</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" id="tts-form">
            {% csrf_token %}
            <label for="text">Text</label>
            <textarea id="text" name="text" placeholder="Enter text to convert to speech...">{{ text|default:"" }}</textarea>

            <label for="voice">Voice</label>
            <select id="voice" name="voice">
                <optgroup label="Female">
                    {% for v in female_voices %}
                    <option value="{{ v }}" {% if voice == v %}selected{% endif %}>{{ v }}</option>
                    {% endfor %}
                </optgroup>
                <optgroup label="Male">
                    {% for v in male_voices %}
                    <option value="{{ v }}" {% if voice == v %}selected{% endif %}>{{ v }}</option>
                    {% endfor %}
                </optgroup>
            </select>

            <label for="style">Style Instructions <span style="font-weight:400;color:#666">(optional)</span></label>
            <input type="text" id="style" name="style" value="{{ style|default:"" }}"
                   placeholder="e.g. Say cheerfully, Speak in a whisper, Read slowly and dramatically"
                   style="width:100%;padding:10px 12px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e0e0e0;font-size:1rem;margin-bottom:24px;">

            <button type="submit" id="gen-btn">Generate Speech</button>
            <div class="spinner" id="spinner">Generating audio, please wait...</div>
        </form>

        {% if audio_url %}
        <div class="result">
            <h3>Generated Audio</h3>
            <audio controls autoplay src="{{ audio_url }}"></audio>
            <a class="download-btn" href="{% url 'download' filename %}">Download WAV</a>
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById('tts-form').addEventListener('submit', function() {
            document.getElementById('gen-btn').disabled = true;
            document.getElementById('gen-btn').textContent = 'Generating...';
            document.getElementById('spinner').style.display = 'block';
        });
    </script>
</body>
</html>
